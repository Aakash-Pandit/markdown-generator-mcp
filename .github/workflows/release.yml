name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: windows
            arch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          EXT=""
          [ "${{ matrix.os }}" = "windows" ] && EXT=".exe"
          go build -o "markdown-generator-mcp-${{ matrix.os }}-${{ matrix.arch }}${EXT}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: markdown-generator-mcp-${{ matrix.os }}-${{ matrix.arch }}
          path: markdown-generator-mcp-${{ matrix.os }}-${{ matrix.arch }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: markdown-generator-mcp-*
